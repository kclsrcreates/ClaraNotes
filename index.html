<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaraNotes</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=JetBrains+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--night:#0a0a0f;--deep:#13131a;--surface:#1c1c26;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8e6f0;--muted:#6b6880;--gold:#f0c060;--coral:#ff6b6b;--mint:#50e3a4;--sky:#64b5f6;--lavender:#b39ddb;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--night);color:var(--text);}
body{display:flex;flex-direction:column;overflow:hidden;}
input,textarea,button,select{font-family:inherit;}

/* AUTH */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse 80% 50% at 30% 20%,rgba(240,192,96,0.06),transparent);}
.auth-box{background:#13131a;border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,0.5);}
.auth-brand{text-align:center;margin-bottom:28px;}
.auth-icon{width:44px;height:44px;background:linear-gradient(135deg,#f0c060,#ff6b6b);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px;}
.auth-name{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#f0c060,#e8e6f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.auth-tabs{display:flex;background:#1c1c26;border-radius:10px;padding:3px;margin-bottom:22px;}
.auth-tab{flex:1;padding:8px;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;color:#6b6880;background:transparent;}
.auth-tab.on{background:#13131a;color:#e8e6f0;}
.auth-alert{display:none;padding:10px 14px;border-radius:8px;font-size:0.78rem;margin-bottom:14px;}
.auth-alert.err{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.25);color:#ff6b6b;}
.auth-alert.ok{background:rgba(80,227,164,0.1);border:1px solid rgba(80,227,164,0.25);color:#50e3a4;}
.fld{margin-bottom:14px;}
.fld label{display:block;font-family:'JetBrains Mono',monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;color:#6b6880;margin-bottom:7px;}
.fld input{width:100%;background:#1c1c26;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:0.88rem;color:#e8e6f0;outline:none;transition:border-color 0.2s;}
.fld input:focus{border-color:rgba(240,192,96,0.4);}
.fld input::placeholder{color:#6b6880;}
.auth-submit{width:100%;padding:13px;background:linear-gradient(135deg,#f0c060,#ff6b6b);border:none;border-radius:10px;font-size:0.9rem;font-weight:700;color:#0a0a0f;cursor:pointer;margin-top:6px;transition:all 0.2s;}
.auth-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(240,192,96,0.3);}
.auth-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

/* APP */
#appScreen{display:none;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPBAR */
.topbar{height:50px;background:var(--night);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.topbar-brand{display:flex;align-items:center;gap:8px;margin-right:8px;}
.topbar-icon{width:26px;height:26px;background:linear-gradient(135deg,#f0c060,#ff6b6b);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.topbar-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;background:linear-gradient(135deg,#f0c060,#e8e6f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-search{flex:1;max-width:320px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:0.78rem;color:var(--text);outline:none;}
.topbar-search::placeholder{color:var(--muted);}
.topbar-search:focus{border-color:rgba(240,192,96,0.3);}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center;}
.tb-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;font-size:0.72rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.tb-btn:hover{background:var(--surface);color:var(--text);}
.tb-btn.primary{background:rgba(240,192,96,0.1);border-color:rgba(240,192,96,0.25);color:#f0c060;}
.tb-btn.primary:hover{background:rgba(240,192,96,0.18);}
.user-chip{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);padding:4px 8px;background:var(--surface);border-radius:6px;border:1px solid var(--border);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* LAYOUT */
.app-layout{display:grid;grid-template-columns:220px 1fr 280px;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:var(--night);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:12px 10px 8px;display:flex;align-items:center;justify-content:space-between;}
.sb-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);}
.sb-new{width:24px;height:24px;background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#f0c060;cursor:pointer;transition:all 0.15s;}
.sb-new:hover{background:rgba(240,192,96,0.2);}
.nb-list{padding:0 8px;margin-bottom:8px;}
.nb-item{padding:7px 10px;border-radius:7px;cursor:pointer;font-size:0.78rem;font-weight:500;color:var(--muted);transition:all 0.15s;display:flex;align-items:center;gap:7px;margin-bottom:2px;}
.nb-item:hover{background:var(--surface);color:var(--text);}
.nb-item.on{background:rgba(240,192,96,0.08);color:var(--gold);border:1px solid rgba(240,192,96,0.15);}
.nb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.notes-list{flex:1;overflow-y:auto;padding:0 8px;}
.note-card{padding:10px 11px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all 0.15s;}
.note-card:hover{background:var(--surface);}
.note-card.on{background:rgba(240,192,96,0.07);border-color:rgba(240,192,96,0.18);}
.note-card.pinned{border-left:3px solid var(--gold);}
.nc-title{font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nc-preview{font-size:0.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:300;}
.nc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.nc-date{font-family:'JetBrains Mono',monospace;font-size:0.57rem;color:var(--muted);}
.nc-tag{font-size:0.57rem;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;}
.tag-General{background:rgba(179,157,219,0.15);color:#b39ddb;}
.tag-Clinical{background:rgba(255,107,107,0.15);color:#ff6b6b;}
.tag-Study{background:rgba(80,227,164,0.15);color:#50e3a4;}
.tag-Ideas{background:rgba(240,192,96,0.15);color:#f0c060;}
.tag-Finance{background:rgba(100,181,246,0.15);color:#64b5f6;}
.tag-Personal{background:rgba(179,157,219,0.15);color:#b39ddb;}
.sb-footer{padding:10px 12px;border-top:1px solid var(--border);}
.storage-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);margin-bottom:5px;}
.storage-bar{height:3px;background:var(--surface);border-radius:2px;overflow:hidden;}
.storage-fill{height:100%;background:linear-gradient(90deg,#50e3a4,#f0c060);border-radius:2px;transition:width 0.5s;}

/* CANVAS */
.canvas{display:flex;flex-direction:column;overflow:hidden;background:var(--deep);}
.canvas-toolbar{display:flex;align-items:center;gap:4px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--night);flex-wrap:wrap;flex-shrink:0;}
.ct-btn{padding:5px 9px;background:transparent;border:1px solid transparent;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s;display:flex;align-items:center;gap:4px;}
.ct-btn:hover{background:var(--surface);border-color:var(--border);color:var(--text);}
.ct-btn.on{background:rgba(240,192,96,0.12);border-color:rgba(240,192,96,0.28);color:var(--gold);}
.ct-div{width:1px;height:18px;background:var(--border);margin:0 3px;}
.tag-sel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:0.7rem;color:var(--text);outline:none;cursor:pointer;margin-left:auto;}
.tag-sel option{background:var(--deep);}

/* NOTE EDITOR */
.note-editor{flex:1;overflow-y:auto;padding:32px 44px;}
.note-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;background:transparent;border:none;outline:none;color:var(--text);width:100%;letter-spacing:-0.02em;margin-bottom:10px;line-height:1.2;}
.note-title::placeholder{color:var(--muted);}
.note-meta{display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;}
.n-meta{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);display:flex;align-items:center;gap:4px;}
.n-meta.live{color:var(--mint);}
.note-body{font-size:0.9rem;line-height:1.9;color:#ccc;font-weight:300;outline:none;min-height:200px;}
.note-body:empty::before{content:'Start writing... Select text to highlight it, or ask Clara AI for help.';color:var(--muted);font-style:italic;pointer-events:none;}
.note-body b{font-weight:700;color:var(--text);}
.note-body i{font-style:italic;}
.note-body u{text-decoration:underline;}
.note-body h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--text);margin:16px 0 8px;letter-spacing:-0.02em;}
.note-body h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text);margin:14px 0 6px;}
.note-body ul{margin:8px 0 8px 20px;}
.note-body li{margin-bottom:4px;}
.checklist-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.checklist-item input[type=checkbox]{margin-top:3px;accent-color:var(--gold);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.checklist-item.done span{text-decoration:line-through;opacity:0.5;}
.note-highlight{background:rgba(240,192,96,0.2);color:var(--gold);padding:1px 3px;border-radius:3px;cursor:pointer;}

/* EMPTY STATE */
.canvas-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.ce-icon{font-size:3rem;}
.ce-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--text);opacity:0.4;}
.ce-sub{font-size:0.8rem;font-weight:300;}
.ce-btn{background:linear-gradient(135deg,#f0c060,#ff6b6b);color:#0a0a0f;border:none;padding:11px 26px;border-radius:10px;font-size:0.84rem;font-weight:700;cursor:pointer;margin-top:6px;transition:all 0.2s;}
.ce-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,192,96,0.25);}

/* STATUS BAR */
.statusbar{height:26px;background:var(--night);border-top:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 14px;font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);flex-shrink:0;}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--mint);}
.sb-right{margin-left:auto;}

/* AI PANEL */
.ai-panel{background:var(--night);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.ai-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ai-brand{display:flex;align-items:center;gap:7px;font-size:0.78rem;font-weight:700;color:var(--gold);}
.ai-glyph{width:24px;height:24px;background:linear-gradient(135deg,#f0c060,#ff6b6b);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;}
.ai-status{font-family:'JetBrains Mono',monospace;font-size:0.58rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--muted);}
.ai-feed{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.ai-wrap{display:flex;flex-direction:column;}
.ai-wrap.u{align-items:flex-end;}
.ai-lbl{font-family:'JetBrains Mono',monospace;font-size:0.54rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:3px;padding:0 3px;}
.ai-bub{padding:9px 11px;border-radius:9px;font-size:0.76rem;line-height:1.6;max-width:95%;}
.ai-bub.c{background:var(--surface);border:1px solid var(--border);border-radius:9px 9px 9px 2px;color:var(--text);}
.ai-bub.u{background:rgba(240,192,96,0.1);border:1px solid rgba(240,192,96,0.2);border-radius:9px 9px 2px 9px;color:var(--text);}
.ai-think{display:flex;gap:4px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;width:fit-content;}
.ai-think span{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:blink 1.2s infinite;}
.ai-think span:nth-child(2){animation-delay:0.2s;}
.ai-think span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,100%{opacity:0.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}
.ai-quick{padding:7px 9px;border-top:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}
.ai-q-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:0.62rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s;}
.ai-q-btn:hover{background:rgba(240,192,96,0.1);color:var(--gold);border-color:rgba(240,192,96,0.25);}
.ai-input-row{display:flex;gap:6px;align-items:flex-end;padding:9px 10px;border-top:1px solid var(--border);flex-shrink:0;}
.ai-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-size:0.76rem;color:var(--text);resize:none;outline:none;min-height:34px;}
.ai-input:focus{border-color:rgba(240,192,96,0.35);}
.ai-input::placeholder{color:var(--muted);}
.ai-send{width:32px;height:32px;background:linear-gradient(135deg,#f0c060,#ff6b6b);border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.82rem;color:#0a0a0f;font-weight:700;flex-shrink:0;transition:all 0.2s;}
.ai-send:hover{transform:scale(1.05);}
.ai-send:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:999;}
.modal-bg.on{display:flex;}
.modal{background:var(--deep);border:1px solid var(--border2);border-radius:16px;padding:28px 26px;max-width:340px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.5);}
.modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:8px;}
.modal p{font-size:0.8rem;color:var(--muted);margin-bottom:14px;font-weight:300;line-height:1.6;}
.modal-preview{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:0.78rem;margin-bottom:18px;font-style:italic;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;padding:9px;border-radius:8px;border:none;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.modal-btn.cancel{background:var(--surface);color:var(--text);}
.modal-btn.del{background:rgba(255,107,107,0.15);color:var(--coral);border:1px solid rgba(255,107,107,0.3);}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#222230;border:1px solid var(--border2);border-radius:9px;padding:10px 18px;font-size:0.8rem;font-weight:500;z-index:9999;transition:transform 0.3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* COLOR PICKER */
.color-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;flex-shrink:0;}
.color-dot:hover,.color-dot.on{border-color:white;transform:scale(1.2);}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* RESPONSIVE */
@media(max-width:900px){
.app-layout{grid-template-columns:1fr;}
.sidebar,.ai-panel{display:none;}
.note-editor{padding:20px 18px;}
}
</style>
</head>
